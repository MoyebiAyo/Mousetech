  <!-- Logo/Brand -->
  <text x="100" y="140" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff">MouseTech</text>
  
  <!-- Tagline -->
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="32" fill="#7ab8f5">Software Solutions Company</text>
  
  <!-- Main Headline -->
  <text x="100" y="320" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff">Custom Software,</text>
  <text x="100" y="380" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#7ab8f5">Built to Scale</text>
  
  <!-- Features -->
  <g font-family="Arial, sans-serif" font-size="28" fill="#ffffff">
    <text x="100" y="470">✓ Web Development</text>
    <text x="100" y="520">✓ Mobile Apps</text>
    <text x="500" y="470">✓ Custom Software</text>
    <text x="500" y="520">✓ UI/UX Design</text>
  </g>
  
  <!-- Website URL -->
  <text x="100" y="590" font-family="Arial, sans-serif" font-size="24" fill="#7ab8f5">mousetech.app</text>
  
  <!-- Decorative Line -->
  <line x1="100" y1="250" x2="1100" y2="250" stroke="#1e5fa8" stroke-width="3" opacity="0.5"/>
