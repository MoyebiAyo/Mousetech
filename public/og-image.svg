<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#1a2e42"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Pattern -->
  <g opacity="0.1">
    <circle cx="200" cy="300" r="200" fill="#1e5fa8"/>
    <circle cx="1000" cy="150" r="180" fill="#1e5fa8"/>
  </g>
  
  <!-- Grid Pattern -->
  <g opacity="0.05" fill="#ffffff">
