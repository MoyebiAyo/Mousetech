    <circle cx="80" cy="0" r="1"/>
    <circle cx="120" cy="0" r="1"/>
    <circle cx="160" cy="0" r="1"/>
    <circle cx="200" cy="0" r="1"/>
    <circle cx="240" cy="0" r="1"/>
    <circle cx="280" cy="0" r="1"/>
    <circle cx="320" cy="0" r="1"/>
    <circle cx="360" cy="0" r="1"/>
    <circle cx="400" cy="0" r="1"/>
    <circle cx="440" cy="0" r="1"/>
    <circle cx="480" cy="0" r="1"/>
    <circle cx="520" cy="0" r="1"/>
    <circle cx="560" cy="0" r="1"/>
    <circle cx="600" cy="0" r="1"/>
    <circle cx="640" cy="0" r="1"/>
    <circle cx="680" cy="0" r="1"/>
    <circle cx="720" cy="0" r="1"/>
    <circle cx="760" cy="0" r="1"/>
    <circle cx="800" cy="0" r="1"/>
    <circle cx="840" cy="0" r="1"/>
    <circle cx="880" cy="0" r="1"/>
    <circle cx="920" cy="0" r="1"/>
    <circle cx="960" cy="0" r="1"/>
    <circle cx="1000" cy="0" r="1"/>
    <circle cx="1040" cy="0" r="1"/>
    <circle cx="1080" cy="0" r="1"/>
    <circle cx="1120" cy="0" r="1"/>
    <circle cx="1160" cy="0" r="1"/>
